<header class="site-header" role="banner">
  <div class="wrapper" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;">
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">
      {{ site.title | escape }}
    </a>

    {% assign nav_pages = site.pages | where_exp: "p", "p.nav_order != nil" | sort: "nav_order" %}
    <nav class="site-nav">
      {% for p in nav_pages %}
        <a class="page-link" href="{{ p.url | relative_url }}">{{ p.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
