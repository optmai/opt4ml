<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title | default: site.title }}</title>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">

  <!-- Mobile menu styles -->
<style>

.book-header{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
}

.book-menu-toggle{
  display:none;
  background:none;
  border:none;
  font-size:1.6rem;
  cursor:pointer;
}

.book-nav{
  display:flex;
  gap:1.2rem;
}

.book-nav-link{
  text-decoration:none;
}

/* mobile layout */
@media (max-width:768px){

  .book-menu-toggle{
    display:block;
  }

  .book-nav{
    display:none;
    position:absolute;
    top:60px;
    right:0;
    width:220px;
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px 15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    flex-direction:column;
  }

  .book-nav.open{
    display:flex;
  }

}

</style>

</head>
